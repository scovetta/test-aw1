name: OSS-Fuzz
on: [pull_request]
jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    steps:
    - name: Build Fuzzers
      uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@2dc71767a7483e3035f57c9fc3a0f21ad3b28599 # master@2026-03-06
      with:
        oss-fuzz-project-name: 'zlib'
        dry-run: false

    - name: Run Fuzzers
      uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@2dc71767a7483e3035f57c9fc3a0f21ad3b28599 # master@2026-03-06
      with:
        oss-fuzz-project-name: 'zlib'
        fuzz-seconds: 300
        dry-run: false

    - name: Upload Crash
      uses: actions/upload-artifact@v6
      if: failure()
      with:
        name: artifacts
        path: ./out/artifacts
