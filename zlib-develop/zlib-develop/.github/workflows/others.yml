name: anyVM-OSes

on: [push, pull_request]

jobs:

  dragonflybsd:
    runs-on: ubuntu-latest
    name: DragonflyBSD
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: DragonflyBSD
      uses: vmactions/dragonflybsd-vm@323497fa680c1856dd1ba5c4fd89182a9194f649 # v1
      with:
        copyback: false
        prepare: |
          pkg install -y cmake gcc14 bzip2

        run: |
          cmake . -B build -DZLIB_BUILD_MINIZIP=ON -DMINIZIP_ENABLE_BZIP2=ON
          cmake --build build/
          ctest --test-dir build --output-on-failure

  freebsd:
    runs-on: ubuntu-latest
    name: FreeBSD - ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aarch64
          - name: x86_64
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: FreeBSD - ${{ matrix.name }}
      uses: vmactions/freebsd-vm@4807432c7cab1c3f97688665332c0b932062d31f # v1
      with:
        arch: ${{ matrix.name }}
        copyback: false
        release: "15.0"
        prepare: |
          pkg install -y cmake gcc14 bzip2

        run: |
          cmake . -B build -DZLIB_BUILD_MINIZIP=ON -DMINIZIP_ENABLE_BZIP2=ON
          cmake --build build/
          ctest --test-dir build --output-on-failure -E .*summary

  netbsd:
    runs-on: ubuntu-latest
    name: NetBSD - ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aarch64
          - name: x86_64
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: NetBSD - ${{ matrix.name }}
      uses: vmactions/netbsd-vm@ca7ff0556959998c82761c34ea0c3c99fa084c48 # v1
      with:
        copyback: false
        prepare: |
          export PATH="/usr/pkg/sbin:/usr/pkg/bin:$PATH"
          export PKG_PATH="https://cdn.NetBSD.org/pub/pkgsrc/packages"
          export PKG_PATH="$PKG_PATH/$(uname -s)/$(uname -m)/$(uname -r|cut -f '1 2' -d.)/All"
          /usr/sbin/pkg_add cmake
          /usr/sbin/pkg_add bzip2

        run: |
          cmake . -B build -DZLIB_BUILD_MINIZIP=ON -DMINIZIP_ENABLE_BZIP2=ON
          cmake --build build/
          ctest --test-dir build --output-on-failure

  omni-os:
    runs-on: ubuntu-latest
    name: OmniOS
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: OmniOS
      uses: vmactions/omnios-vm@68da93c6d9812b29fc90c5b5141b093f84a590fb # v1
      with:
        copyback: false
        prepare: |
          pkg install cmake gcc14 make bzip2

        run: |
          cmake . -B build -DZLIB_BUILD_MINIZIP=ON -DMINIZIP_ENABLE_BZIP2=ON
          cmake --build build/
          ctest --test-dir build --output-on-failure

  openbsd:
    runs-on: ubuntu-latest
    name: OpenBSD - ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aarch64
          - name: x86_64
          - name: riscv64
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: OpenBSD - ${{ matrix.name }}
      uses: vmactions/openbsd-vm@3fafb45f2e2e696249c583835939323fe1c3448c # v1
      with:
        arch: ${{ matrix.name }}
        copyback: false
        prepare: |
          pkg_add cmake
          bzip2

        run: |
          cmake . -B build -DZLIB_BUILD_MINIZIP=ON -DMINIZIP_ENABLE_BZIP2=ON
          cmake --build build/
          ctest --test-dir build

