name: mingw/cygwin

on: [push, pull_request]

jobs:
  MSys:
    runs-on: ${{ matrix.os || 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        sys: [mingw32, mingw64, ucrt64, clang64, clangarm64]
        include:
          - sys: clangarm64
            os: windows-11-arm
    name: MSys - ${{ matrix.sys }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Setup MSYS2
      uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda # v2.30.0
      with:
        msystem: ${{ matrix.sys }}
        update: true
        install: >-
          make
        pacboy: >-
          toolchain:p
          cmake:p
    - name: Configure
      if: matrix.sys != 'clang64'
      run: |
        cmake -G"Unix Makefiles" \
          -S . \
          -B build \
          -DCMAKE_VERBOSE_MAKEFILE=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DZLIB_BUILD_MINIZIP=ON \
          -DMINIZIP_ENABLE_BZIP2=ON
    - name: Configure clang64
      if: matrix.sys == 'clang64'
      run: |
        CC=clang cmake -G"Unix Makefiles" \
          -S . \
          -B build \
          -DCMAKE_VERBOSE_MAKEFILE=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DZLIB_BUILD_MINIZIP=ON \
          -DMINIZIP_ENABLE_BZIP2=ON
    - name: Build
      run: cmake --build build --config Release
    - name: Run tests
      run: ctest --output-on-failure --test-dir build -C Release

  cygwin:
    strategy:
      fail-fast: false
    runs-on: windows-latest
    defaults:
      run:
        shell: C:\cygwin\bin\bash.exe --login -o igncr '{0}'
    name: Cygwin
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Setup cygwin
      uses: cygwin/cygwin-install-action@bfb11f06b50864a101fa716f2b6ebfa3f6585089 # v6.1
      with:
        packages: >-
          cmake
          cygwin-devel
          gcc-core
          gcc-g++
          ninja
    - name: Configure
      run: |
        cmake /cygdrive/d/a/zlib/zlib \
          -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DZLIB_BUILD_MINIZIP=ON \
          -DMINIZIP_ENABLE_BZIP2=OFF \
          -G Ninja
    - name: Build
      run: cmake --build build --config Release -v -j1
    - name: Run tests
      run: ctest --output-on-failure --test-dir build -C Release
